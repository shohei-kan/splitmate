

services:
  db:
    image: postgres:16
    container_name: splitmate-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: splitmate-backend
    restart: unless-stopped
    env_file:
      - ./.env
      - ./backend/.env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy    
    ports:
      - "8000:8000"

volumes:
  postgres_data:
